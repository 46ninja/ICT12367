<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ICT12367 SPU{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ตกแต่งแถบเมนูด้านบนให้เป็นสีเทาเข้ม */
        .navbar-custom {
            background-color: #380b4e; 
        }
        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link {
            color: white;
        }
        
        /* ตกแต่งรูปภาพแบนเนอร์ด้านบน */
        .hero-section {
            position: relative;
            text-align: center;
            color: white;
            /* คุณสามารถเปลี่ยน URL รูปภาพด้านล่างเป็นรูปภาพของคุณเองได้ */
            background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-overlay {
            background-color: rgba(0, 0, 0, 0.6); /* ทำให้รูปมืดลงนิดหน่อยเพื่อให้ตัวหนังสือชัดเจน */
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            font-weight: bold;
            font-size: 2rem;
        }
        
        /* สีตัวหนังสือสีม่วงตามแบบ */
        .text-purple {
            color: #6f42c1;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">ICT12367 SPU</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">หน้าแรก</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/form">ลงทะเบียน</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">เกี่ยวกับเรา</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
